annotations:
  category: CMS
  licenses: Apache-2.0
  images: |
    - name: wordpress-nginx
      image: ghcr.io/ioanalytica/wordpress-nginx:6.9.4-5
apiVersion: v2
appVersion: 6.9.4
dependencies:
- condition: memcached.enabled
  name: memcached
  repository: oci://registry-1.docker.io/bitnamicharts
  version: 7.x.x
- condition: mariadb.enabled
  name: mariadb
  repository: oci://registry-1.docker.io/bitnamicharts
  version: 21.x.x
- name: common
  repository: oci://registry-1.docker.io/bitnamicharts
  version: 2.x.x
description: >-
  WordPress with NGINX for Kubernetes. Supports Memcached, Redis,
  and Dragonfly for caching, plus an optional FlexSearch sidecar (wordpress-idx)
  for full-text search.
home: https://github.com/ioanalytica/wordpress-nginx
icon: https://raw.githubusercontent.com/ioanalytica/wordpress-nginx/develop/icon.png
keywords:
- application
- blog
- cms
- http
- php
- web
- wordpress
- nginx
maintainers:
- name: IO ANALYTICA
  url: https://ioanalytica.com
name: wordpress-nginx
sources:
- https://github.com/ioanalytica/wordpress-nginx
version: 6.9.4-5
