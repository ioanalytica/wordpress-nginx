apiVersion: v2
name: wordpress-nginx
version: 6.9.4-14
appVersion: 6.9.4

description: >-
  WordPress with NGINX for Kubernetes. Supports internal or external MariaDB,
  Dragonfly (Redis/Memcached) caching, and an optional FlexSearch sidecar
  (wordpress-idx) for full-text search.
home: https://github.com/ioanalytica/wordpress-nginx
icon: https://raw.githubusercontent.com/ioanalytica/wordpress-nginx/develop/icon.png
sources:
- https://github.com/ioanalytica/wordpress-nginx

maintainers:
- name: IO ANALYTICA
  url: https://ioanalytica.com

keywords:
- application
- blog
- cms
- http
- php
- web
- wordpress
- nginx

annotations:
  category: CMS
  licenses: Apache-2.0
  # NOTE: The WordPress application deployed by this chart is GPL-2.0+.
  imageTag: "6.9.4-14"
  idxImageTag: "0.1.10"
  images: |
    - name: wordpress-nginx
      image: ghcr.io/ioanalytica/wordpress-nginx:6.9.4-14
    - name: wordpress-idx
      image: ghcr.io/ioanalytica/wordpress-idx:0.1.10

dependencies:
- name: common
  repository: oci://ghcr.io/ioanalytica/charts
  version: 0.1.x
